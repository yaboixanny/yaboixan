<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Title | Yaboixan</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .post-header {
            height: 60vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            background-size: cover;
            background-position: center;
            margin-top: 70px;
        }

        .post-header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(38, 34, 32, 0.5);
        }

        .post-header-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 0 5%;
        }

        .post-body {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 5%;
            line-height: 1.8;
            font-size: 1.1rem;
            color: #444;
        }

        .post-body h2,
        .post-body h3 {
            color: var(--primary);
            margin-top: 2.5rem;
        }

        .post-body p {
            margin-bottom: 1.5rem;
        }

        .post-body img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 2rem 0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .gallery-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
            display: none;
            /* Hidden by default, shown if gallery exists */
        }

        .gallery-title {
            text-align: center;
            color: var(--primary);
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .gallery-item {
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1024px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.5rem;
            }
        }

        /* Lightbox Styles */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            cursor: default;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .gallery-item {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav style="background: rgba(22, 78, 99, 0.95); padding: 1rem 5%;">
        <div class="logo">YABOIXAN</div>
        <div class="nav-links">
            <a href="index.html#home" style="color: #F5E6D3;">Home</a>
            <a href="index.html#stories" style="color: #F5E6D3;">Stories</a>
            <a href="index.html#about" style="color: #F5E6D3;">About</a>
        </div>
    </nav>

    <header class="post-header" id="postHero">
        <div class="post-header-content">
            <span class="hero-subtitle" id="postCategory" style="color: #F5E6D3;">Category</span>
            <h1 id="postTitle" style="color: white; font-size: 3.5rem;">Loading Article...</h1>
            <p id="postDate" style="opacity: 0.8; font-style: italic;"></p>
        </div>
    </header>

    <main class="post-body">
        <a href="index.html#stories" class="back-link">← Back to Stories</a>
        <div id="postContent">
            <!-- Content will be injected here -->
        </div>
    </main>

    <section class="gallery-container" id="galleryContainer">
        <h2 class="gallery-title">The Full Gallery</h2>
        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery images will be injected here -->
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img src="" alt="Enlarged gallery image" id="lightboxImg">
    </div>

    <footer>
        <div class="footer-logo">YABOIXAN</div>
        <p>&copy; 2026 Alexander. All rights reserved.</p>
    </footer>

    <script type="module">
        import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxClose = document.getElementById('lightboxClose');

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // Restore scrolling
        }

        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg) {
                closeLightbox();
            }
        });

        lightboxClose.addEventListener('click', closeLightbox);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        async function loadPost() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const slug = params.get('slug');

            if (!id && !slug) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Fetch posts from the static JSON file
                const response = await fetch('/posts.json');
                const posts = await response.json();

                const post = posts.find(p => p.id == id || p.slug == slug);

                if (post) {
                    document.title = `${post.title} | Yaboixan`;
                    document.getElementById('postHero').style.backgroundImage = `url(${post.image})`;
                    document.getElementById('postTitle').textContent = post.title;
                    document.getElementById('postCategory').textContent = post.category;
                    document.getElementById('postDate').textContent = post.date;
                    document.getElementById('postContent').innerHTML = marked.parse(post.content || post.excerpt);

                    // Render gallery if it exists
                    if (post.gallery && post.gallery.length > 0) {
                        const galleryContainer = document.getElementById('galleryContainer');
                        const galleryGrid = document.getElementById('galleryGrid');
                        galleryContainer.style.display = 'block';
                        galleryGrid.innerHTML = post.gallery.map(img => `
                            <div class="gallery-item" onclick="document.dispatchEvent(new CustomEvent('open-lightbox', {detail: '${img}'}))">
                                <img src="${img}" alt="Gallery image for ${post.title}" loading="lazy">
                            </div>
                        `).join('');

                        // Listen for custom event to open lightbox (since this script is a module)
                        document.addEventListener('open-lightbox', (e) => openLightbox(e.detail));
                    }
                } else {
                    document.getElementById('postContent').innerHTML = '<p>Story not found.</p>';
                }
            } catch (err) {
                console.error('Error loading post:', err);
                document.getElementById('postContent').innerHTML = '<p>Failed to load the story.</p>';
            }
        }

        loadPost();
    </script>
</body>

</html>
