<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaboixan Login | Admin Access</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 10rem auto;
            padding: 3rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(38, 34, 32, 0.1);
            text-align: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }

        .error-msg {
            color: var(--accent);
            margin-top: 1rem;
            display: none;
            font-weight: 600;
        }
    </style>
</head>

<body style="background: var(--secondary);">
    <div class="login-container">
        <h2 style="margin-bottom: 2rem; color: var(--primary);">Alexander's Vault</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Security Key</label>
                <input type="password" id="password" required placeholder="Enter key to access CMS...">
            </div>
            <button type="submit" class="btn-primary" style="border: none; cursor: pointer; width: 100%;">Unlock
                Dashboard</button>
        </form>
        <div id="error" class="error-msg">Incorrect key. Try again.</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const error = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('yaboixan_token', data.token);
                    window.location.href = 'admin.html';
                } else {
                    error.style.display = 'block';
                }
            } catch (err) {
                console.error('Login error:', err);
            }
        });
    </script>
</body>

</html>
